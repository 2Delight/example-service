name: GLCR

on:
  push:
    branches:
      - master
    tags:
      - '*'
  workflow_dispatch:

jobs:
  model-registry:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        model:
          - yolov8n
          - yolov8s
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Get repository and version  
        if: startsWith(github.ref, 'refs/tags')
        id: get_data
        run: |
            echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT
            echo "REPOSITORY=github.com/${GITHUB_REPOSITORY}" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign weights
        run: |
            mkdir ./s3-weights
            mv ./weights/yolov8n.pt ./s3-weights
            VAULT_ADDR=${{ secrets.VAULT_ADDR }} VAULT_TOKEN=${{ secrets.VAULT_TOKEN }} cosign sign-blob --key hashivault://signer --bundle ./s3-weights/${{ $matrix.model }}.json ./s3-weights/${{ $matrix.model }}.pt

      - name: Upload latest weights
        if: startsWith(github.ref, 'refs/heads/master')
        uses: shallwefootball/s3-upload-action@v1.3.3
        with:
          aws_key_id: ${{ secrets.AWS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY}}
          aws_bucket: ${{ secrets.AWS_BUCKET }}
          source_dir: ./s3_weights
          destination_dir: s3://example-service/latest/${{ $matrix.model }}
          endpoint: https://storage.yandexcloud.net

      - name: Upload tag weights
        if: startsWith(github.ref, 'refs/heads/master')
        uses: shallwefootball/s3-upload-action@v1.3.3
        with:
          aws_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_bucket: mlops
          source_dir: ./s3_weights
          destination_dir: s3://example-service/${{ steps.get_data.outputs.VERSION }}/${{ $matrix.model }}
          endpoint: https://storage.yandexcloud.net
